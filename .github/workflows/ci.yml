name: ci

on:
  push:
    tags:
      - "v*.*.*"

  repository_dispatch:
    types: [build-docs]

permissions:
  contents: write

jobs:
  docker:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve_tag.outputs.tag }}
    steps:
      # =========================
      # CHECKOUT DOCS REPO
      # =========================
      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # =========================
      # DETERMINE TAG
      # =========================
      - name: Resolve tag
        id: resolve_tag
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            if [ -z "${{ github.event.client_payload.tag }}" ]; then
              echo "Error: repository_dispatch requires client_payload.tag" >&2
              exit 1
            fi
            echo "TAG=${{ github.event.client_payload.tag }}" >> $GITHUB_ENV
            echo "tag=${{ github.event.client_payload.tag }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${{ github.ref_name }}" >> $GITHUB_ENV
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      # =========================
      # DOWNLOAD OPENAPI FROM RELEASE
      # =========================
      - name: Download OpenAPI
        run: |
          mkdir -p static/openapi

          URL="https://github.com/vsys-host/shkeeper.io/releases/download/${TAG}/openapi.json"

          HTTP_CODE=$(curl -L \
            -H "Accept: application/octet-stream" \
            -w "%{http_code}" \
            -o static/openapi/openapi.json.tmp \
            -s "$URL")

          if [ "$HTTP_CODE" = "200" ]; then
            mv static/openapi/openapi.json.tmp static/openapi/openapi.json
            echo "OPENAPI_EXISTS=true" >> $GITHUB_ENV
            echo "OpenAPI downloaded"
          else
            rm -f static/openapi/openapi.json.tmp
            echo "OPENAPI_EXISTS=false" >> $GITHUB_ENV
            echo "OpenAPI not found, using existing file"
          fi
      # =========================
      # VERIFY OPENAPI
      # =========================
      - name: Verify OpenAPI
        if: env.OPENAPI_EXISTS == 'true'
        run: |
          python - << 'EOF'
          import json
          with open('static/openapi/openapi.json') as f:
              data = json.load(f)
          assert 'openapi' in data
          assert 'info' in data
          print("OpenAPI OK")
          EOF

      # =========================
      # COMMIT OPENAPI TO DOCS REPO
      # =========================
      - name: Commit OpenAPI to repo
        if: env.OPENAPI_EXISTS == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add static/openapi/openapi.json
          if ! git diff --cached --quiet -- static/openapi/openapi.json; then
            git commit -m "chore: update openapi for ${TAG} [skip ci]"
            git push origin main
          else
            echo "no changes"
          fi

      # =========================
      # SYNC LATEST MAIN
      # =========================
      - name: Sync main
        run: |
          git fetch origin main
          git checkout -B main origin/main

      # =========================
      # DOCKER META
      # =========================
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: vsyshost/shkeeper-docs
          tags: |
            type=semver,pattern={{version}},value=${{ env.TAG }}
          flavor: |
            latest=false

      # =========================
      # LOGIN
      # =========================
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # =========================
      # BUILD & PUSH
      # =========================
      - name: Build & push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          no-cache: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            docker pull vsyshost/shkeeper-docs:${{ needs.docker.outputs.tag }}
            docker stop shkeeper-docs || true
            docker rm shkeeper-docs || true
            docker run -d \
              --name shkeeper-docs \
              --restart always \
              -p 80:80 \
              vsyshost/shkeeper-docs:${{ needs.docker.outputs.tag }}
            docker image prune -af