info:
  description: >
    # Introduction

    SHKeeper - is an open-source, self-hosted cryptocurrency payment processor.
    It uniquely serves as both a gateway and a merchant, enabling you to accept
    payments in various cryptocurrencies without fees and intermediaries.


    # Authentication

    You can authenticate either via Basic Auth or an API key depending from
    endpoint requirement. You can generate or view an API key in the SHKeeper UI
    under `Wallets` -> `Manage` -> `API key`. For metrics endpoints, use
    `METRICS_USERNAME` and `METRICS_PASSWORD`.


    <!-- Redoc-Inject: <security-definitions> -->
  contact:
    email: support@shkeeper.io
    url: https://shkeeper.io
  x-logo:
    url: https://shkeeper.io/images/shkeeper-logo.svg
    altText: SHKeeper logo
  license:
    name: GPL-3.0
    url: https://github.com/vsys-host/shkeeper.io
  title: SHKeeper API
  version: 2.3.5
servers:
  - url: https://demo.shkeeper.io
tags:
  - name: Cryptos
    x-displayName: Available crypto
    description: Crypto currency operations
  - name: Invoices
    x-displayName: Invoices
    description: Invoices operations
  - name: Payouts
    x-displayName: Payouts
    description: Payouts operations
  - name: Payments
    x-displayName: Payments
    description: Payments operations
  - name: Metrics
    x-displayName: Metrics
    description: Metrics operations
  - name: Transactions
    x-displayName: Transactions
    description: Transaction operations
  - name: Encryption
    x-displayName: Wallet encryption
    description: Wallet encryption operations
  - name: Notifications
    x-displayName: Wallet notifications
    description: Wallet notifications operations
  - name: Other
    x-displayName: Useful endpoints
    description: Other operations
x-tagGroups:
  - name: Obtain crypto address
    tags:
      - Cryptos
      - Invoices
  - name: Payouts
    tags:
      - Payouts
  - name: Payments
    tags:
      - Payments
  - name: Transactions
    tags:
      - Transactions
  - name: Security
    tags:
      - Encryption
  - name: Other
    tags:
      - Other
      - Metrics
      - Notifications
paths:
  /:
    get:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - wallet
  /wallets:
    get:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - wallet
  /{crypto_name}/get-rate/{fiat}:
    get:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - wallet
    parameters:
      - in: path
        name: fiat
        required: true
        schema:
          type: string
          minLength: 1
      - in: path
        name: crypto_name
        required: true
        schema:
          type: string
          minLength: 1
  /{crypto_name}/get-rate:
    get:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - wallet
    parameters:
      - in: path
        name: crypto_name
        required: true
        schema:
          type: string
          minLength: 1
  /payout/{crypto_name}:
    get:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - wallet
    parameters:
      - in: path
        name: crypto_name
        required: true
        schema:
          type: string
          minLength: 1
  /wallet/{crypto_name}:
    get:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - wallet
    parameters:
      - in: path
        name: crypto_name
        required: true
        schema:
          type: string
          minLength: 1
  /rates/{fiat}:
    get:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - wallet
    parameters:
      - in: path
        name: fiat
        required: true
        schema:
          type: string
          minLength: 1
    post:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - wallet
  /rates:
    get:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - wallet
    post:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - wallet
  /transactions:
    get:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - wallet
  /settings:
    get:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      summary: User settings page including 2FA management
      tags:
        - wallet
  /parts/transactions:
    get:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - wallet
  /payouts:
    get:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - wallet
  /parts/payouts:
    get:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - wallet
  /parts/tron-multiserver:
    get:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - wallet
    post:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - wallet
  /configure/tron:
    get:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - wallet
    post:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - wallet
  /parts/tron-staking-stake:
    get:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - wallet
    post:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - wallet
  /metrics:
    get:
      responses:
        '200':
          description: Success – metrics retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsResponse'
        '401':
          description: Unauthorized – invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - Metrics
      description: >-
        Retrieve system and cryptocurrency metrics.


        Authorization: HTTP Basic Auth using metric credentials. Metric
        credentials can be set via environment variables: METRICS_USERNAME,
        METRICS_PASSWORD. Default username/password: shkeeper/shkeeper.
      security:
        - Basic_Metrics: []
      x-codeSamples:
        - lang: cURL
          label: CLI
          source: |
            curl --location --request GET 'https://demo.shkeeper.io/metrics' \
            --header 'Authorization: Basic c2hrZWVwZXI6c2hrZacvb3Q='
  /unlock:
    get:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - wallet
    post:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - wallet
  /api/v1/crypto:
    get:
      responses:
        '200':
          description: Success – available cryptocurrencies retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCryptoResponse'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - Cryptos
      description: >-
        Retrieve the list of available cryptocurrencies.


        Use `crypto_list` for integrations. The `crypto` field is kept only for
        backward compatibility.
      x-codeSamples:
        - lang: cURL
          label: CLI
          source: >
            curl --location --request GET
            'https://demo.shkeeper.io/api/v1/crypto'
  /api/v1/crypto/balances:
    get:
      responses:
        '200':
          description: Success – balances retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalancesResponse'
        '400':
          description: Error – invalid includes or no valid cryptos requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalancesError'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - Cryptos
      description: >-
        Retrieve balances for all enabled cryptos, or for a subset specified via
        query parameter 'includes'.
      security:
        - API_Key: []
      parameters:
        - name: includes
          in: query
          required: false
          description: Comma-separated list of crypto identifiers (e.g., BTC,ETH,TRX)
          schema:
            type: string
            example: BTC,ETH
      x-codeSamples:
        - lang: cURL
          label: CLI
          source: >
            curl --location --request GET
            'https://demo.shkeeper.io/api/v1/crypto/balances?includes=BTC,ETH' \

            --header 'X-Shkeeper-API-Key: YOUR_API_KEY'
  /api/v1/{crypto_name}/generate-address:
    get:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - api_v1
    parameters:
      - in: path
        name: crypto_name
        required: true
        schema:
          type: string
          minLength: 1
  /api/v1/{crypto_name}/payment_request:
    post:
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPaymentResponse'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - Payments
      description: Create a payment request
      security:
        - API_Key: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
      x-codeSamples:
        - lang: cURL
          label: CLI
          source: >
            curl --location --request POST
            'https://demo.shkeeper.io/api/v1/ETH/payment_request' \

            --header 'X-Shkeeper-API-Key: YOUR_API_KEY' \

            --header 'Content-Type: application/json' \

            --data-raw
            '{"external_id":107,"fiat":"USD","amount":"18.25","callback_url":"https://my-billing/callback.php"}'
    parameters:
      - in: path
        name: crypto_name
        required: true
        schema:
          type: string
          minLength: 1
  /api/v1/{crypto_name}/quote:
    post:
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error1'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      summary: Return a fiat->crypto quote for the given crypto.
      tags:
        - Cryptos
      description: Create a quote
      security:
        - API_Key: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuoteRequest'
      x-codeSamples:
        - lang: cURL
          label: CLI
          source: >
            curl --location --request POST
            'https://demo.shkeeper.io/api/v1/ETH/quote' \

            --header 'X-Shkeeper-API-Key: YOUR_API_KEY' \

            --header 'Content-Type: application/json' \

            --data-raw '{"fiat":"USD","amount":"100.00"}'
    parameters:
      - in: path
        name: crypto_name
        required: true
        schema:
          type: string
          minLength: 1
  /api/v1/{crypto_name}/payment-gateway:
    get:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      summary: Get current payment gateway status and token.
      tags:
        - api_v1
    parameters:
      - in: path
        name: crypto_name
        required: true
        schema:
          type: string
          minLength: 1
    post:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      summary: Enable/disable payment gateway.
      tags:
        - api_v1
  /api/v1/{crypto_name}/payment-gateway/token:
    post:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      summary: Set shared API token for all cryptos.
      tags:
        - api_v1
    parameters:
      - in: path
        name: crypto_name
        required: true
        schema:
          type: string
          minLength: 1
  /api/v1/{crypto_name}/transaction:
    post:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      summary: Add a transaction manually.
      tags:
        - api_v1
    parameters:
      - in: path
        name: crypto_name
        required: true
        schema:
          type: string
          minLength: 1
  /api/v1/{crypto_name}/payout_destinations:
    post:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      summary: Manage payout destinations (add/delete/list).
      tags:
        - api_v1
    parameters:
      - in: path
        name: crypto_name
        required: true
        schema:
          type: string
          minLength: 1
  /api/v1/{crypto_name}/autopayout:
    post:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      summary: Configure auto payout policy for a crypto wallet.
      tags:
        - api_v1
    parameters:
      - in: path
        name: crypto_name
        required: true
        schema:
          type: string
          minLength: 1
  /api/v1/{crypto_name}/status:
    get:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      summary: Return wallet status and on-chain sync state.
      tags:
        - api_v1
    parameters:
      - in: path
        name: crypto_name
        required: true
        schema:
          type: string
          minLength: 1
  /api/v1/{crypto_name}/balance:
    get:
      responses:
        '200':
          description: Success – balance retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceResponse'
        '400':
          description: Error – crypto not enabled or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error1'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - Cryptos
      description: >-
        Retrieve balance information for a specific crypto, including amount in
        crypto, fiat, and server status.
      security:
        - API_Key: []
      x-codeSamples:
        - lang: cURL
          label: CLI
          source: >
            curl --location --request GET
            'https://demo.shkeeper.io/api/v1/ETH/balance' \

            --header 'X-Shkeeper-Api-Key: YOUR_API_KEY'
    parameters:
      - in: path
        name: crypto_name
        required: true
        schema:
          type: string
          minLength: 1
  /api/v1/{crypto_name}/payout/status:
    get:
      responses:
        '200':
          description: Payout status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayoutStatusResponse'
        '400':
          description: Missing external_id parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayoutStatusError'
        '404':
          description: Payout not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayoutStatusError'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      tags:
        - Payouts
      description: Retrieve payout status by external_id for the specified cryptocurrency.
      security:
        - API_Key: []
      parameters:
        - name: external_id
          in: query
          required: true
          description: External ID assigned to the payout
          schema:
            type: string
            example: abc123
      x-codeSamples:
        - lang: cURL
          label: CLI
          source: >
            curl --location --request GET
            'https://demo.shkeeper.io/api/v1/BTC/payout/status?external_id=abc123'
            \

            --header 'X-Shkeeper-API-Key: YOUR_API_KEY'
    parameters:
      - in: path
        name: crypto_name
        required: true
        schema:
          type: string
          minLength: 1
  /api/v1/{crypto_name}/payout:
    post:
      responses:
        '200':
          description: Payout task successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayoutResponse'
        '400':
          description: Error creating payout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error1'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      summary: Make a single payout.
      tags:
        - Payouts
      description: Create a single payout for the specified crypto.
      security:
        - Basic_Optional: []
        - Basic: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayoutRequest'
      x-codeSamples:
        - lang: cURL
          label: CLI
          source: >
            curl --location --request POST
            'https://demo.shkeeper.io/api/v1/BTC/payout' \

            --header 'Authorization: Basic YOUR_BASIC_AUTH' \

            --header 'Content-Type: application/json' \

            --data-raw '{"amount":100,"destination":"0x123...","fee":"10"}'
    parameters:
      - in: path
        name: crypto_name
        required: true
        schema:
          type: string
          minLength: 1
  /api/v1/payoutnotify/{crypto_name}:
    post:
      responses:
        '202':
          description: Callback accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: accepted
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      summary: Receive payout completion notifications from backend wallet services.
      tags:
        - Notifications
      description: >-
        SHKeeper sends a callback notification after a payout is completed.


        If `enable_payout_callback` is enabled, the callback will be sent
        automatically.

        If a `callback_url` was provided during payout creation, SHKeeper will
        send the notification to that URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayoutCallback'
    parameters:
      - in: path
        name: crypto_name
        required: true
        schema:
          type: string
          minLength: 1
  /api/v1/walletnotify/{crypto_name}/{txid}:
    get:
      responses:
        '202':
          description: Callback accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: accepted
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      summary: Receive on-chain tx notifications from backend wallet services.
      tags:
        - Notifications
      description: >-
        SHKeeper sends payment notifications for invoice-related transactions.


        Each transaction is sent individually, and the transaction that
        triggered the callback has `trigger = true`.

        Your server should respond with HTTP 202 if successfully processed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCallback'
    parameters:
      - in: path
        name: crypto_name
        required: true
        schema:
          type: string
          minLength: 1
      - in: path
        name: txid
        required: true
        schema:
          type: string
          minLength: 1
  /api/v1/{crypto_name}/decrypt:
    get:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      summary: Return wallet encryption state (used by backend services).
      tags:
        - api_v1
    parameters:
      - in: path
        name: crypto_name
        required: true
        schema:
          type: string
          minLength: 1
  /api/v1/{crypto_name}/server:
    get:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      summary: Return RPC server credentials and host.
      tags:
        - api_v1
    parameters:
      - in: path
        name: crypto_name
        required: true
        schema:
          type: string
          minLength: 1
  /api/v1/{crypto_name}/server/key:
    post:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      summary: Not implemented yet (placeholder).
      tags:
        - api_v1
    parameters:
      - in: path
        name: crypto_name
        required: true
        schema:
          type: string
          minLength: 1
  /api/v1/{crypto_name}/server/host:
    post:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      summary: Not implemented yet (placeholder).
      tags:
        - api_v1
    parameters:
      - in: path
        name: crypto_name
        required: true
        schema:
          type: string
          minLength: 1
  /api/v1/{crypto_name}/backup:
    get:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      summary: >-
        Return a wallet backup (either file content or streamed binary from a
        remote URL).
      tags:
        - api_v1
    parameters:
      - in: path
        name: crypto_name
        required: true
        schema:
          type: string
          minLength: 1
  /api/v1/{crypto_name}/exchange-rate:
    post:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      summary: Update exchange rate source/values for a crypto/fiat pair.
      tags:
        - api_v1
    parameters:
      - in: path
        name: crypto_name
        required: true
        schema:
          type: string
          minLength: 1
  /api/v1/{crypto_name}/estimate-tx-fee/{amount}:
    get:
      responses:
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      summary: >-
        Estimate transaction fee for a given amount (optionally address via
        query).
      tags:
        - api_v1
    parameters:
      - in: path
        name: amount
        required: true
        schema:
          type: string
          minLength: 1
      - in: path
        name: crypto_name
        required: true
        schema:
          type: string
          minLength: 1
  /api/v1/{crypto_name}/task/{id}:
    get:
      responses:
        '200':
          description: Task status (PENDING, SUCCESS, or FAILURE)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error1'
        default:
          $ref: '#/components/responses/DEFAULT_ERROR'
      summary: Get task/job details by id from crypto backend.
      tags:
        - Other
      description: Check the status of a multi-payout task for the specified crypto.
      security:
        - Basic_Optional: []
        - Basic: []
      x-codeSamples:
        - lang: cURL
          label: CLI
          source: >
            curl --location --request GET
            'https://demo.shkeeper.io/api/v1/ETH-USDC/task/7028c45b-0c88-483e-b703-dd455a361b2e'
            \

            --header 'Authorization: Basic YOUR_BASE64_CREDENTIALS'
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          minLength: 1
      - in: path
        name: crypto_name
        required: true
        schema:
          type: string
          minLength: 1
  /api/v1/{crypto_name}/multipayout:
    post:
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MultipayoutResponse'
        '400':
          description: Error
          content:
            application/json:
