openapi: 3.0.3
components:
  schemas:
    Error:
      type: object
      properties:
        code:
          type: integer
          description: Error code
        status:
          type: string
          description: Error name
        message:
          type: string
          description: Error message
        errors:
          type: object
          description: Errors
          additionalProperties: {}
      additionalProperties: false
    PaginationMetadata:
      type: object
      properties:
        total:
          type: integer
        total_pages:
          type: integer
        first_page:
          type: integer
        last_page:
          type: integer
        page:
          type: integer
        previous_page:
          type: integer
        next_page:
          type: integer
      additionalProperties: false
    MetricsItem:
      type: object
      properties:
        name:
          type: string
          description: Metric name
          example: ethereum_fullnode_last_block
        value:
          type: number
          description: Metric value
          example: 6415394
        labels:
          type: object
          description: Optional labels for the metric
          example:
            version: 1.14.6
          additionalProperties:
            type: string
      additionalProperties: false
    MetricsResponse:
      type: object
      properties:
        metrics:
          type: array
          description: List of system and crypto metrics
          items:
            $ref: '#/components/schemas/MetricsItem'
      additionalProperties: false
    CryptoItem:
      type: object
      properties:
        name:
          type: string
          description: Crypto identifier used in API endpoints
          example: ETH
        display_name:
          type: string
          description: Human-readable crypto name
          example: Ethereum
      additionalProperties: false
    GetCryptoResponse:
      type: object
      properties:
        status:
          type: string
          description: Response status
          example: success
        crypto:
          type: array
          description: Legacy list of crypto identifiers (backward compatibility)
          example:
            - BNB
            - BTC
            - ETH
          items:
            type: string
        crypto_list:
          type: array
          description: Preferred list of available cryptocurrencies
          items:
            $ref: '#/components/schemas/CryptoItem'
      additionalProperties: false
    BalanceItem:
      type: object
      properties:
        name:
          type: string
          description: Crypto symbol
          example: BTC
        display_name:
          type: string
          description: Human-readable crypto name
          example: Bitcoin
        amount_crypto:
          type: string
          description: Amount in crypto
          example: '0.12345678'
        rate:
          type: string
          description: Current exchange rate to fiat
          example: '70616.07'
        fiat:
          type: string
          description: Fiat currency
          example: USD
        amount_fiat:
          type: string
          description: Amount in fiat currency
          example: '8700.12'
        server_status:
          type: string
          description: Backend node/server status
          example: online
      additionalProperties: false
    BalancesResponse:
      type: object
      properties:
        status:
          type: string
          description: Response status
          example: success
        balances:
          type: array
          description: List of balances
          items:
            $ref: '#/components/schemas/BalanceItem'
      additionalProperties: false
    BalancesError:
      type: object
      properties:
        status:
          type: string
          description: Response status
          example: error
        message:
          type: string
          description: Error message
          example: No valid cryptos requested
      additionalProperties: false
    PaymentRequest:
      type: object
      properties:
        external_id:
          type: string
          example: order_123456
          description: External order ID in merchant system
        fiat:
          type: string
          example: USD
          description: Fiat currency code (ISO 4217)
        amount:
          type: string
          example: '100.00'
          description: Order amount in fiat currency as string
        callback_url:
          type: string
          format: url
          example: https://example.com/payment/callback
          description: URL that will receive payment status callbacks
      required:
        - amount
        - fiat
      additionalProperties: false
    PaymentResponse:
      type: object
      properties:
        status:
          type: string
          example: success
          description: Payment processing status
        amount:
          type: string
          example: '0.01080125'
          description: Payment amount as a string to preserve precision
        exchange_rate:
          type: string
          example: '3379.24'
          description: Exchange rate at the time of payment
        display_name:
          type: string
          example: Ethereum
          description: Human-readable cryptocurrency name
        wallet:
          type: string
          example: '0x8695f1a224e28adf362E6f8a8E695EDCc5D64960'
          description: Destination wallet address
        recalculate_after:
          type: integer
          example: 0
          description: Seconds after which the exchange rate should be recalculated
      additionalProperties: false
    ErrorPaymentResponse:
      type: object
      properties:
        status:
          type: string
          example: error
          description: Error status
        message:
          type: string
          example: BTC payment gateway is unavailable
          description: Human-readable error message
      additionalProperties: false
    QuoteRequest:
      type: object
      properties:
        fiat:
          type: string
          example: USD
        amount:
          type: string
          example: '10.00'
      required:
        - amount
        - fiat
      additionalProperties: false
    QuoteResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        crypto_amount:
          type: string
        exchange_rate:
          type: string
      additionalProperties: false
    Error1:
      type: object
      properties:
        status:
          type: string
          example: error
          description: Request status
        message:
          type: string
          description: Error message
        traceback:
          type: string
          default: null
          nullable: true
      additionalProperties: false
    BalanceResponse:
      type: object
      properties:
        name:
          type: string
          description: Crypto symbol
          example: ETH
        display_name:
          type: string
          description: Human-readable crypto name
          example: Ethereum
        amount_crypto:
          type: string
          description: Balance in crypto units
          example: '0.0213590094'
        rate:
          type: string
          description: Current exchange rate to fiat
          example: '4158.44000000'
        fiat:
          type: string
          description: Fiat currency
          example: USD
        amount_fiat:
          type: string
          description: Balance converted to fiat
          example: '88.8201590493'
        server_status:
          type: string
          description: Current status of crypto server
          example: Synced
      additionalProperties: false
    PayoutStatusResponse:
      type: object
      properties:
        id:
          type: integer
          example: 114
          description: Internal payout ID
        external_id:
          type: string
          example: abc123
          description: External payout ID provided by merchant
        crypto:
          type: string
          example: BTC
          description: Cryptocurrency code
        status:
          type: string
          example: SUCCESS
          description: 'Payout status: SUCCESS, IN_PROGRESS, FAIL'
        amount:
          type: string
          example: '100.50'
          description: Payout amount
        destination:
          type: string
          example: 0x1234567890abcdef...
          description: Destination address
        txid:
          type: string
          example: 0f999d988641395b38943d8a9c01581c19fcaa4dcdd4bb35f99e16510fdd10d6
          description: Blockchain transaction ID (null if not yet broadcasted)
      additionalProperties: false
    PayoutStatusError:
      type: object
      properties:
        error:
          type: string
          example: Payout not found
          description: Error message
      additionalProperties: false
    PayoutRequest:
      type: object
      properties:
        amount:
          type: string
          description: The amount to send
          example: '107'
        destination:
          type: string
          description: Destination address
          example: '0xBD26e3512ce84F315e90E3FE75907bfbB5bD0c44'
        fee:
          type: string
          description: >-
            Transaction fee (sat/vByte for BTC, sat/Byte for LTC/DOGE, integer
            for XMR, ignored for others)
          example: '10'
        callback_url:
          type: string
          description: Optional callback URL to receive payout notifications
          example: https://my.payout.com/notification
        external_id:
          type: string
          description: Optional external order ID
          example: '435345534'
      required:
        - amount
        - destination
        - fee
      additionalProperties: false
    PayoutResponse:
      type: object
      properties:
        task_id:
          type: string
          description: ID of the payout task
          example: b2a01bb0-8abe-403b-a3fa-8124c84bcf23
        external_id:
          type: string
          description: Echoed external ID if provided
          example: '435345534'
      additionalProperties: false
    PayoutCallbackTransaction:
      type: object
      properties:
        payout_id:
          type: integer
          description: Internal payout ID
          example: 14
        external_id:
          type: string
          description: External ID assigned to the payout
          example: '435345534'
        tx_hash:
          type: string
          description: Blockchain transaction hash
          example: AF732D1D1254C97A77F4DD08553725E6ECC011CA6DCD12BC65FA1D8551E54E6D
        status:
          type: string
          description: 'Payout status: SUCCESS, FAILURE, or IN_PROGRESS'
          example: SUCCESS
        amount:
          type: string
          description: Amount in cryptocurrency
          example: '2.0000000000'
        crypto:
          type: string
          description: Cryptocurrency code
          example: XRP
        amount_fiat:
          type: string
          description: Amount in fiat currency
          example: '4.364200000000000000'
        currency_fiat:
          type: string
          description: Fiat currency code
          example: USD
        timestamp:
          type: string
          description: Timestamp of payout
          example: '2024-11-27T13:49:22'
      additionalProperties: false
    PayoutCallback:
      type: object
      properties:
        payouts:
          type: array
          description: List of completed payouts
          items:
            $ref: '#/components/schemas/PayoutCallbackTransaction'
      required:
        - payouts
      additionalProperties: false
    TransactionCallback:
      type: object
      properties:
        txid:
          type: string
          description: Blockchain transaction ID
          example: '0x518a10b13a708fd11aa98db88c625dd45130db6656ba822600b01d0c53c85078'
        date:
          type: string
          description: Transaction date
          example: '2024-06-25 15:45:38'
        amount_crypto:
          type: string
          description: Transaction amount in crypto
          example: '7.80000000'
        amount_fiat:
          type: string
          description: Transaction amount in fiat
          example: '7.80'
        trigger:
          type: boolean
          description: True if this transaction triggered the callback
          example: true
        crypto:
          type: string
          description: Transaction cryptocurrency
          example: ETH-USDT
      additionalProperties: false
    PaymentCallback:
      type: object
      properties:
        external_id:
          type: string
          description: Invoice or order ID in external system
          example: '147'
        crypto:
          type: string
          description: Cryptocurrency used
          example: ETH-USDT
        addr:
          type: string
          description: Wallet address that received the payment
          example: '0x6f2Fc9D7205B7D9037dDE45B5f9e12B18EA07e27'
        fiat:
          type: string
          description: Fiat currency used
          example: USD
        balance_fiat:
          type: string
          description: Amount in fiat
          example: '7.80'
        balance_crypto:
          type: string
          description: Amount in crypto
          example: '7.80000000'
        paid:
          type: boolean
          description: True if fully paid
          example: true
        status:
          type: string
          description: 'Invoice status: PARTIAL, PAID, OVERPAID'
          example: PAID
        transactions:
          type: array
          description: Transactions related to the payment request
          items:
            $ref: '#/components/schemas/TransactionCallback'
        fee_percent:
          type: string
          description: Fee percentage added to invoice
          example: '2'
        overpaid_fiat:
          type: string
          description: Overpaid amount in fiat
          example: '0.00'
      additionalProperties: false
    TaskResultItem:
      type: object
      properties:
        dest:
          type: string
          description: Destination address
          example: TGusXhweqkJ1aJftjmAfLqA1rfEWD4hSGZ
        amount:
          type: string
          description: Amount sent
          example: '100'
        status:
          type: string
          description: Status of payout item
          example: success
        txids:
          type: array
          description: Transaction IDs associated with this payout
          example:
            - 4c32969220743644e3480d96e95a423d351049ac6296b8315103225709881ae3
            - da2996bae7a8a4d655a1288f8f4c79ce0aa3640e61f8ae8de08ae9c70c72d90d
          items:
            type: string
      additionalProperties: false
    TaskResponse:
      type: object
      properties:
        result:
          type: array
          description: Task results or null if pending
          items:
            $ref: '#/components/schemas/TaskResultItem'
          nullable: true
        status:
          type: string
          description: Task status
          example: PENDING / SUCCESS / FAILURE
      required:
        - status
      additionalProperties: false
    MultipayoutItem:
      type: object
      properties:
        dest:
          type: string
          description: Destination address
          example: '0xE77895BAda700d663f033510f73f1E988CF55756'
        amount:
          type: string
          description: Amount to send
          example: '100.0'
        external_id:
          type: string
          description: Optional external ID
          example: '43234'
        callback_url:
          type: string
          description: Optional callback URL
          example: https://my.payout.com/notification
        dest_tag:
          type: integer
          description: Optional XRP destination tag
          example: 12345
      required:
        - amount
        - dest
      additionalProperties: false
    MultipayoutResponse:
      type: object
      properties:
        task_id:
          type: string
          example: 0471adec-5de5-4668-bc1d-e8e7729cb676
        external_ids:
          type: array
          example:
            - '43234'
            - '43235'
          items:
            type: string
      additionalProperties: false
    ListAddressesResponse:
      type: object
      properties:
        status:
          type: string
          description: Response status
          example: success
        addresses:
          type: array
          description: List of wallet addresses for the given crypto
          example:
            - '0x0A71f4741DcaD3C06AA51eE6cF0E22675507d0d0'
            - '0x8695f1a224e28adf362E6f8a8E695EDCc5D64960'
          items:
            type: string
      additionalProperties: false
    Transaction:
      type: object
      properties:
        addr:
          type: string
          description: Cryptocurrency address
          example: '0xDCA83F12D963c7233E939a32e31aD758C7cCF307'
        amount:
          type: string
          description: Transaction amount
          example: '0.0001000000'
        crypto:
          type: string
          description: Cryptocurrency symbol
          example: ETH
        status:
          type: string
          description: Transaction status
          example: CONFIRMED
        txid:
          type: string
          description: Transaction ID
          example: '0xbcf68720db79454f40b2acf6bfb18897d497ab4d8bc9faf243c859d14d5d6b66'
      additionalProperties: false
    RetrieveTransactionsResponse:
      type: object
      properties:
        status:
          type: string
          example: success
          description: Request status
        transactions:
          type: array
          description: List of transactions for the requested address
          items:
            $ref: '#/components/schemas/Transaction'
      additionalProperties: false
    InvoiceTransaction:
      type: object
      properties:
        txid:
          type: string
          description: Transaction ID
        amount:
          type: string
          description: Transaction amount in crypto
        crypto:
          type: string
          description: Crypto currency symbol
        addr:
          type: string
          description: Crypto address
        status:
          type: string
          description: Transaction status
      additionalProperties: false
    Invoice:
      type: object
      properties:
        external_id:
          type: string
          description: External invoice ID
        fiat:
          type: string
          description: Fiat currency code, e.g., USD
        amount_fiat:
          type: string
          description: Amount in fiat
        balance_fiat:
          type: string
          description: Balance in fiat
        status:
          type: string
          description: Invoice status, e.g., UNPAID
        txs:
          type: array
          description: Transactions linked to this invoice
          items:
            $ref: '#/components/schemas/InvoiceTransaction'
      additionalProperties: false
    InvoicesListResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        invoices:
          type: array
          description: List of invoices
          items:
            $ref: '#/components/schemas/Invoice'
      required:
        - invoices
        - status
      additionalProperties: false
    TxInfo:
      type: object
      properties:
        addr:
          type: string
          description: Transaction address
          example: '0xDCA83F12D963c7233E939a32e31aD758C7cCF307'
        amount:
          type: string
          description: Transaction amount
          example: '0.295503'
        crypto:
          type: string
          description: Cryptocurrency code
          example: ETH
      required:
        - addr
        - amount
        - crypto
      additionalProperties: false
    TxInfoResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        info:
          description: Transaction info. Empty object if transaction not found.
          example:
            addr: '0xDCA83F12D963c7233E939a32e31aD758C7cCF307'
            amount: '0.295503'
            crypto: ETH
          allOf:
            - $ref: '#/components/schemas/TxInfo'
      additionalProperties: false
    DecryptionKeyForm:
      type: object
      properties:
        key:
          type: string
          description: The decryption key to unlock the wallet
          example: asdfasfasgasgasgasgdeagweg
      additionalProperties: false
    DecryptionKeySuccess:
      type: object
      properties:
        status:
          type: string
          example: success
          description: Request status
        message:
          type: string
          example: Decryption key was already entered
          description: Optional message if key was already submitted
      additionalProperties: false
    DecryptionKeyError:
      type: object
      properties:
        status:
          type: string
          example: error
          description: Request status
        message:
          type: string
          example: Invalid decryption key
          description: Error message describing what went wrong
      additionalProperties: false
  responses:
    DEFAULT_ERROR:
      description: Default error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  securitySchemes:
    API_Key:
      type: apiKey
      description: >-
        Send the API Key in the request header: `X-Shkeeper-Api-Key: {API
        Key}`. 
      name: X-Shkeeper-Api-Key
      in: header
    Basic:
      type: http
      description: >-
        Basic HTTP authentication: `Authorization: Basic
        {base64(username:password)}`.
      scheme: basic
    Basic_Optional:
      type: http
      description: >-
        Optional Basic Auth: if `Authorization` header is provided, the user is
        attached to the request context (`g.user`). Otherwise, the request is
        treated as anonymous.
      scheme: basic
    Basic_Metrics:
      type: http
      description: >-
        Basic HTTP authentication specifically for metrics endpoints. Checks
        credentials against environment variables `METRICS_USERNAME` and
        `METRICS_PASSWORD`. Defaults: username=`shkeeper`, password=`shkeeper`.
      scheme: basic
